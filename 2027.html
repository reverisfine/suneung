<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>은또링쌤의 행성 연구소 — 2027 6월 모평 대비</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
:root{--purp:#6c5ce7;--purpdk:#4b3fc4;--lav:#a78bfa;--ink:#3a3550;--soft:#6b6486;
 --grad:linear-gradient(135deg,#c9b8f5 0%,#b9c4f0 45%,#d6c4ee 100%);
 --hero:linear-gradient(135deg,rgba(214,203,250,.55),rgba(190,202,246,.5) 55%,rgba(228,210,244,.55));}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Pretendard','Noto Sans KR',system-ui,sans-serif;}
body{min-height:100vh;background:var(--grad);color:var(--ink);position:relative;overflow-x:hidden;}
.bgdeco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bgdeco span{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5;animation:drift 14s ease-in-out infinite;}
.b1{width:120px;height:120px;background:rgba(255,255,255,.35);top:8%;left:6%;}
.b2{width:80px;height:80px;background:rgba(255,226,122,.4);top:60%;left:80%;animation-delay:-4s;}
.b3{width:150px;height:150px;background:rgba(167,139,250,.35);top:75%;left:10%;animation-delay:-8s;}
.b4{width:60px;height:60px;background:rgba(255,255,255,.4);top:30%;left:88%;animation-delay:-2s;}
@keyframes drift{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-26px) scale(1.06);}}
.shell{position:relative;max-width:860px;margin:0 auto;padding:20px 18px 60px;z-index:1;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.brand{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:800;color:#fff;background:none;border:none;cursor:pointer;text-shadow:0 1px 6px rgba(75,63,196,.4);}
.brand img{width:22px;height:22px;display:block;filter:drop-shadow(0 1px 4px rgba(75,63,196,.4));}
.pill{font-size:11.5px;font-weight:700;color:var(--purpdk);background:rgba(255,255,255,.7);padding:6px 13px;border-radius:999px;backdrop-filter:blur(6px);}
.hero{position:relative;overflow:hidden;text-align:center;padding:30px 24px 36px;margin-top:6px;background:var(--hero);border-radius:32px;border:1px solid rgba(255,255,255,.65);backdrop-filter:blur(10px);box-shadow:0 20px 50px -20px rgba(75,63,196,.4);}
.heropill{display:inline-block;font-size:13px;font-weight:700;color:var(--purpdk);background:#fff;padding:8px 18px;border-radius:999px;margin-bottom:18px;box-shadow:0 6px 18px -6px rgba(108,92,231,.4);}
.herotitle{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin:0;font-size:clamp(30px,7vw,50px);font-weight:800;line-height:1.08;letter-spacing:-.02em;color:#fff;text-shadow:0 2px 4px rgba(75,63,196,.45),0 6px 18px rgba(75,63,196,.3);}
.heroacc{color:#ffe27a;font-weight:800;text-shadow:0 2px 5px rgba(150,100,20,.35);}
.herobear{width:74px;height:auto;flex-shrink:0;filter:drop-shadow(0 8px 14px rgba(75,63,196,.3));animation:bfloat 3.2s ease-in-out infinite;}
@keyframes bfloat{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-9px) rotate(2deg);}}
.herosub{margin:18px 0 24px;font-size:15px;line-height:1.6;color:#fff;font-weight:700;text-shadow:0 1px 6px rgba(75,63,196,.35);}
.herostats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.stat{flex:1 1 90px;max-width:160px;background:#fff;border-radius:20px;padding:16px 10px;box-shadow:0 10px 24px -12px rgba(75,63,196,.35);}
.statnum{font-size:30px;font-weight:900;color:var(--purp);line-height:1;letter-spacing:-.02em;}
.statunit{font-size:14px;font-weight:700;margin-left:2px;color:var(--lav);}
.statlbl{margin-top:7px;font-size:12px;font-weight:700;color:var(--soft);}
.sechead{text-align:center;margin:40px 0 22px;}
.sech2{margin:0;font-size:26px;font-weight:800;color:#fff;letter-spacing:-.01em;text-shadow:0 2px 12px rgba(75,63,196,.28);}
.sech2 .acc{color:#fff3c4;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.tile{position:relative;text-align:left;background:#fff;border:none;border-radius:24px;padding:24px 22px 22px;cursor:pointer;box-shadow:0 14px 32px -16px rgba(75,63,196,.35);transition:all .22s ease;}
.tile:hover{transform:translateY(-4px);box-shadow:0 22px 40px -16px rgba(75,63,196,.45);}
.tileicon{font-size:34px;margin-bottom:12px;}
.tileno{font-size:13px;font-weight:900;color:var(--lav);margin-bottom:4px;}
.tiletitle{font-size:18px;font-weight:800;color:var(--purpdk);letter-spacing:-.01em;}
.tilesub{margin-top:7px;font-size:12.5px;line-height:1.5;color:var(--soft);font-weight:500;}
.tilecnt{position:absolute;top:22px;right:20px;font-size:12px;font-weight:800;color:#fff;background:var(--purp);padding:4px 11px;border-radius:999px;}
.sechero{position:relative;text-align:center;padding:26px 22px 30px;margin-top:6px;background:var(--hero);border-radius:28px;border:1px solid rgba(255,255,255,.65);backdrop-filter:blur(10px);box-shadow:0 18px 44px -22px rgba(75,63,196,.4);}
.backbtn{position:absolute;top:18px;left:18px;font-size:12.5px;font-weight:700;color:var(--purpdk);background:#fff;border:none;border-radius:999px;padding:7px 14px;cursor:pointer;box-shadow:0 4px 12px -4px rgba(108,92,231,.4);}
.secicon{font-size:40px;margin:14px 0 8px;}
.seckicker{font-size:13px;font-weight:800;color:#fff;margin-bottom:4px;text-shadow:0 1px 5px rgba(75,63,196,.4);}
.sectitle{margin:0;font-size:26px;font-weight:800;color:#fff;letter-spacing:-.01em;text-shadow:0 2px 4px rgba(75,63,196,.45);}
.secsub{margin:10px 0 0;font-size:13.5px;color:#fff;font-weight:700;text-shadow:0 1px 5px rgba(75,63,196,.35);}
.chiprow{display:flex;gap:8px;overflow-x:auto;padding:18px 2px 4px;}
.chiprow::-webkit-scrollbar{height:6px;}
.chiprow::-webkit-scrollbar-thumb{background:rgba(108,92,231,.4);border-radius:99px;}
.chip{flex-shrink:0;font-size:12.5px;font-weight:700;color:var(--purpdk);background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.7);border-radius:999px;padding:8px 15px;cursor:pointer;transition:all .18s ease;white-space:nowrap;}
.chip:hover{background:#fff;}
.chip.active{background:var(--purp);color:#fff;border-color:var(--purp);box-shadow:0 8px 18px -8px rgba(108,92,231,.6);}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin:14px 4px 4px;}
.progress{font-size:13px;font-weight:700;color:var(--purpdk);}
.ghostbtn{font-size:12.5px;font-weight:800;color:#fff;background:var(--purp);border:none;border-radius:999px;padding:9px 16px;cursor:pointer;box-shadow:0 8px 18px -8px rgba(108,92,231,.6);}
.main{margin-top:14px;}
/* 개념 정리 카드 */
.introcard{background:linear-gradient(135deg,#f3effe,#fbf0f8);border:1.5px solid #e0d4f5;border-radius:24px;padding:22px 22px 20px;margin:14px 0 4px;box-shadow:0 16px 38px -22px rgba(75,63,196,.3);}
.introhead{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:900;color:#4b3fc4;margin-bottom:4px;}
.introsub{font-size:12.5px;font-weight:700;color:#7c6aa8;margin-bottom:12px;}
.commonbox{background:#fff;border:1.5px solid #d8cff0;border-left:5px solid #6c5ce7;border-radius:12px;padding:12px 15px;font-size:13px;line-height:1.65;color:#403a55;margin-bottom:12px;}
.commonbox b{color:var(--purp);}
.tablescroll{overflow-x:auto;margin-bottom:12px;}
.tablescroll .examtable{min-width:620px;}
.tipbox{background:#fdf0f8;border:1px solid #f4d6e8;border-radius:12px;padding:12px 15px;font-size:13px;line-height:1.65;color:#8a4577;}
.tipbox b{color:#c0468a;}
/* 모성보호 비주얼 */
.mom-hero{position:relative;text-align:center;background:linear-gradient(135deg,#7c6df0,#a78bfa 60%,#c89bf0);border-radius:18px;padding:18px 16px;margin-bottom:15px;color:#fff;box-shadow:0 14px 30px -14px rgba(108,92,231,.55);overflow:hidden;}
.mom-hero::after{content:"💜";position:absolute;right:14px;bottom:8px;font-size:30px;opacity:.35;}
.mom-hero::before{content:"🐻";position:absolute;left:14px;top:10px;font-size:24px;opacity:.45;}
.mom-hero-label{font-size:11.5px;font-weight:700;opacity:.92;letter-spacing:.08em;}
.mom-hero-main{font-size:15px;font-weight:800;margin:3px 0 5px;}
.mom-hero-num{font-size:36px;font-weight:900;color:#ffe27a;text-shadow:0 2px 7px rgba(120,80,10,.35);vertical-align:-3px;margin-right:3px;letter-spacing:-.02em;}
.mom-hero-sub{font-size:12px;font-weight:600;opacity:.96;line-height:1.55;max-width:540px;margin:0 auto;}
.mom-hero-sub b{color:#fff3c4;}
.mom-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(232px,1fr));gap:12px;margin-bottom:14px;}
.mom-card{background:#fff;border-radius:16px;padding:0 0 13px;overflow:hidden;box-shadow:0 10px 24px -16px rgba(75,63,196,.35);border:1px solid #efeafb;transition:transform .18s ease,box-shadow .18s ease;}
.mom-card:hover{transform:translateY(-3px);box-shadow:0 18px 32px -16px rgba(75,63,196,.45);}
.mom-card-head{display:flex;align-items:center;gap:7px;padding:11px 14px;background:var(--mc);color:#fff;}
.mom-ico{font-size:18px;line-height:1;}
.mom-no{font-size:15px;font-weight:900;}
.mom-tit{font-size:14px;font-weight:800;letter-spacing:-.01em;}
.mom-body{padding:12px 14px 0;}
.mom-row{display:flex;align-items:baseline;gap:7px;margin-bottom:7px;}
.mom-rk{flex-shrink:0;font-size:10.5px;font-weight:800;color:#8b86a8;min-width:44px;}
.mom-rv{font-size:12.5px;font-weight:700;color:#403a55;line-height:1.4;}
.mom-hl{display:inline-block;font-size:13px;font-weight:900;color:#fff;background:var(--mc);border-radius:7px;padding:2px 9px;letter-spacing:-.01em;}
.mom-hl.soft{color:var(--mc);background:color-mix(in srgb,var(--mc) 14%,#fff);}
.mom-base{display:inline-block;font-size:11px;font-weight:800;color:#fff;background:#6c5ce7;border-radius:6px;padding:2px 7px;margin-right:2px;}
.mom-base.warn{background:#e8729b;}
.mom-desc{font-size:11.5px;line-height:1.6;color:#6b6486;padding:9px 14px 0;margin-top:5px;border-top:1px dashed #efeafb;}
.mom-desc b{color:var(--mc);}
.mom-extra{display:block;margin-top:7px;padding-top:7px;border-top:1px dashed #f0d8e4;font-size:11px;line-height:1.55;color:#a86b8a;}
.mom-extra b{color:#2bb586;}
.mom-time{background:#faf8ff;border:1px solid #ece7fb;border-radius:14px;padding:14px 18px 16px;margin-bottom:12px;}
.mom-time-tit{font-size:12.5px;font-weight:800;color:#4b3fc4;margin-bottom:14px;}
.mom-time-tit b{color:#6c5ce7;}
.mom-time-bar{display:flex;align-items:flex-start;}
.mom-time-pt{display:flex;flex-direction:column;align-items:center;font-size:11px;font-weight:800;color:#6c5ce7;gap:5px;flex-shrink:0;width:60px;}
.mom-time-pt .dot{width:13px;height:13px;border-radius:50%;background:#6c5ce7;border:2px solid #fff;box-shadow:0 0 0 3px #c4b5fd;}
.mom-time-pt.end{color:#e2768f;}
.mom-time-pt.end .dot{background:#e2768f;box-shadow:0 0 0 3px #f4c2d2;}
.mom-time-seg{flex:1;text-align:center;font-size:10.5px;font-weight:800;color:#fff;background:linear-gradient(90deg,#a78bfa,#c4b5fd);padding:5px 4px;border-radius:7px;margin:0 -3px;position:relative;top:3px;}
/* 구간 구분형 타임라인 */
.mom-tl{margin-top:6px;}
.mom-tl-track{display:flex;align-items:stretch;gap:6px;height:46px;}
.mom-tl-leave{flex:1;display:flex;flex-direction:column;border:2px solid #b9a8ee;border-radius:11px;overflow:hidden;background:#fff;}
.mom-tl-tag{font-size:10px;font-weight:800;text-align:center;padding:2px 0;letter-spacing:-.01em;}
.mom-tl-tag.gray{color:#7c6aa8;background:#efeafb;}
.mom-tl-tag.purp{flex:1;color:#fff;background:linear-gradient(90deg,#7c6df0,#9a86f5);height:100%;display:flex;align-items:center;justify-content:center;border-radius:9px;}
.mom-tl-inner{flex:1;display:flex;}
.mom-tl-wait{flex:1;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:800;color:#b06a8e;background:repeating-linear-gradient(45deg,#fde8f1,#fde8f1 5px,#fbd9e8 5px,#fbd9e8 10px);border-right:1px dashed #e7a8c4;white-space:nowrap;writing-mode:vertical-rl;text-orientation:upright;padding:3px 0;}
.mom-tl-ok{flex:11;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#2f9d72;background:linear-gradient(90deg,#c6f0dd,#a9e8c8);}
.mom-tl-after{flex:1;display:flex;}
.mom-tl-marks{display:flex;margin-top:7px;font-size:9.5px;font-weight:700;color:#8b86a8;line-height:1.3;text-align:left;}
.mom-tl-marks span{position:relative;padding-left:9px;}
.mom-tl-marks span::before{content:"";position:absolute;left:0;top:1px;width:7px;height:7px;border-radius:50%;background:#a78bfa;}
.mom-tl-marks span:first-child{flex:0 0 4%;}
.mom-tl-marks .m2{flex:0 0 46%;}
.mom-tl-marks .m2::before{background:#2bb586;}
.mom-tl-marks .m3{flex:0 0 25%;}
.mom-tl-marks .m4{flex:1;text-align:right;padding-left:0;padding-right:10px;}
.mom-tl-marks .m4::before{content:"";left:auto;right:0;top:1px;background:#e2768f;}
.mom-tl-note{font-size:11px;line-height:1.55;color:#6b6486;margin-top:11px;background:#faf8ff;border-radius:9px;padding:8px 11px;}
.mom-tl-note b{color:#2f9d72;}
/* 7번 초단시간 vs 5인미만 비교 카드 */
.crit-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:11px 0 10px;}
.crit-card{border-radius:15px;overflow:hidden;background:#fff;box-shadow:0 10px 22px -16px rgba(75,63,196,.3);border:1px solid #efeafb;}
.crit-head{display:flex;align-items:center;gap:7px;padding:10px 13px;color:#fff;font-weight:800;font-size:13.5px;background:var(--cc);}
.crit-head .ci{font-size:17px;}
.crit-sec{padding:11px 13px 4px;}
.crit-lbl{font-size:10.5px;font-weight:800;letter-spacing:.02em;margin-bottom:6px;}
.crit-lbl.no{color:#d6557e;}
.crit-lbl.ok{color:#2f9d72;}
.crit-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
.crit-chip{font-size:11.5px;font-weight:700;border-radius:8px;padding:4px 9px;}
.crit-chip.no{color:#c0436a;background:#fde6ee;}
.crit-chip.ok{color:#2c8f68;background:#dcf3e8;}
.crit-overlap{display:flex;align-items:flex-start;gap:9px;background:#fdf0f8;border:1px solid #f4d6e8;border-radius:13px;padding:12px 14px;margin-bottom:4px;}
.crit-overlap .oico{font-size:20px;line-height:1.2;flex-shrink:0;}
.crit-overlap .otext{font-size:12.5px;line-height:1.6;color:#8a4577;}
.crit-overlap .otext b{color:#c0468a;}
/* 현장실습 표준협약서 정리 */
.fld-hero{background:linear-gradient(135deg,#2bb586,#46c79a 60%,#7ad9b8);border-radius:18px;padding:16px 18px;margin-bottom:14px;color:#fff;box-shadow:0 14px 30px -14px rgba(43,181,134,.55);position:relative;overflow:hidden;}
.fld-hero::after{content:"📄";position:absolute;right:14px;bottom:6px;font-size:30px;opacity:.32;}
.fld-hero-t{font-size:15px;font-weight:800;margin-bottom:3px;}
.fld-hero-s{font-size:12px;font-weight:600;opacity:.95;line-height:1.5;}
.fld-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(232px,1fr));gap:12px;margin-bottom:12px;}
.fld-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 10px 22px -16px rgba(75,63,196,.3);border:1px solid #eef0fb;}
.fld-head{display:flex;align-items:center;gap:7px;padding:10px 13px;color:#fff;font-weight:800;font-size:13.5px;background:var(--fc);}
.fld-head .fi{font-size:17px;}
.fld-body{padding:11px 14px 13px;}
.fld-li{display:flex;gap:8px;font-size:12.5px;line-height:1.55;color:#403a55;padding:5px 0;}
.fld-li:not(:last-child){border-bottom:1px dashed #f0eef9;}
.fld-li .fck{flex-shrink:0;color:var(--fc);font-weight:900;}
.fld-li b{color:var(--fc);}
.fld-li .ban{color:#d6557e;font-weight:800;}
.fld-steps{display:flex;flex-direction:column;gap:0;}
.fld-step{display:flex;gap:10px;align-items:flex-start;padding:8px 0;}
.fld-step .sn{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:#2bb586;color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.fld-step .st{font-size:12.5px;line-height:1.6;color:#403a55;}
.fld-step .st b{color:#2bb586;}
/* 공민권 박스 */
.civ-box{margin-top:11px;background:#fff;border:1px solid #d8cff0;border-radius:14px;padding:13px 15px;}
.civ-head{font-size:13.5px;font-weight:800;color:#4b3fc4;margin-bottom:7px;}
.civ-def{font-size:12.5px;line-height:1.65;color:#403a55;margin-bottom:11px;}
.civ-def b{color:#6c5ce7;}
.civ-egs{display:flex;flex-wrap:wrap;gap:7px;}
.civ-eg{font-size:12px;font-weight:700;color:#4b3fc4;background:#f1effd;border:1px solid #e6e0f7;border-radius:9px;padding:6px 11px;}
/* 직업교육훈련촉진법 주요 내용 */
.law-box{margin-top:14px;background:#eef6f1;border:1px solid #d4ebdf;border-radius:14px;padding:13px 15px;}
.law-head{font-size:13px;font-weight:800;color:#2f7a58;margin-bottom:9px;}
.law-egs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px;}
.law-eg{font-size:12px;font-weight:700;color:#2c8f68;background:#dcf3e8;border:1px solid #bfe7d2;border-radius:9px;padding:6px 11px;}
.law-eg.hot{color:#fff;background:#2bb586;border-color:#2bb586;}
.law-note{font-size:11.5px;color:#3c7a5e;line-height:1.5;}
/* 분류 축 라벨 */
.axis-lbl{font-size:13px;font-weight:800;color:#6b6486;margin:6px 0 2px;}
.axis-lbl b{color:#4b3fc4;}
/* 자금 분류 심플 카드 */
.fund-axis{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:#8b86a8;margin:10px 0 9px;}
.fund-axis .n{width:20px;height:20px;border-radius:50%;background:#6c5ce7;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fund-axis b{color:#4b3fc4;}
.fund-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:12px;margin-bottom:13px;}
.fund-card{background:#fff;border-radius:18px;overflow:hidden;border:1px solid #eef0fb;box-shadow:0 12px 26px -18px rgba(75,63,196,.4);}
.fund-head{display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;color:#fff;font-weight:800;font-size:14.5px;background:var(--fc);}
.fund-head .fi{font-size:18px;}
.fund-tag{text-align:center;font-size:16.5px;font-weight:900;color:var(--fc);padding:15px 12px 11px;letter-spacing:-.02em;}
.fund-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:0 14px 14px;}
.fund-chips span{font-size:11.5px;font-weight:700;color:#5a5470;background:#f5f4fb;border-radius:20px;padding:5px 11px;}
.fund-foot{text-align:center;font-size:11.5px;font-weight:800;color:var(--fc);background:color-mix(in srgb,var(--fc) 9%,#fff);padding:9px;}
/* 토글형 자금 분류 */
.fnd-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:13px;}
.fnd-tab{font-size:13px;font-weight:800;color:#8b86a8;background:#f1eefb;border:none;border-radius:22px;padding:9px 20px;cursor:pointer;transition:all .18s;}
.fnd-tab.on{color:#fff;background:linear-gradient(135deg,#7c6df0,#a78bfa);box-shadow:0 8px 18px -8px rgba(108,92,231,.6);}

 지분을 양도할 수 있다.", "(다)는 정관으로 업무집행자를 정하여야 한다.", "(가)와 (나)는 사원의 개성과 서로 간의 신뢰 관계를 기초로 하는 회사이다.", "(가)와 (다)의 중요한 의사 결정은 이사회의 결의로 하여야 한다."], "answer": "③", "items": [{"k": "①", "ox": "X", "t": "(가) 주식회사의 주주는 업무집행권이 없다(이사회·대표이사)."}, {"k": "②", "ox": "X", "t": "(나) 합자회사 유한책임사원의 지분 양도는 ‘무한책임사원 전원’의 동의(‘사원 전원’ 아님)."}, {"k": "③", "ox": "O", "t": "(다) 유한책임회사는 정관으로 업무집행자를 정한다(상법 제287조의12)."}, {"k": "④", "ox": "X", "t": "(가) <b>주식회사는 물적회사</b>로 자본을 중심으로 결합된다. ‘사원 간 개성·신뢰 관계를 기초로 하는 회사’는 <b>인적회사</b> 설명이므로 (가)에 맞지 않아 옳지 않다."}, {"k": "⑤", "ox": "X", "t": "(가) 주식회사의 의사 결정은 <b>주주총회·이사회</b>가, (다) 유한책임회사는 이사회가 없어 <b>사원총회·정관에 의한 업무 집행자</b>가 담당한다. 따라서 ‘(가)·(다) 모두 이사회 결의로 한다’는 옳지 않다."}], "trap": "(다) 유한책임회사는 이사회·주주총회가 없고 <b>정관으로 1명 이상 업무 집행자</b>를 정한다(상법 제287조의12). ‘개성·신뢰 기초’는 인적회사.", "concept": "(가)=주식회사(<b>물적회사</b>) · (나)=합자회사(<b>인적회사 속성 + 유한책임 결합</b>) · (다)=유한책임회사(합자회사 형태에서 업무 집행 사원도 유한책임). 유한책임회사는 정관으로 업무 집행자를 정함."}, {"label": "16번", "score": "3점", "src": "5p · 회사 조직 변경 질의응답", "stem": "다음은 ○○ 회사의 조직 변경에 대한 질의응답이다. 현재 회사의 종류 (가)와 변경 방안인 회사의 종류 (나)에 대한 설명으로 옳은 것은?", "stim": [{"t": "dialogue", "rows": [["질의", "현재 저희 ○○ 회사는 무한책임사원만으로 구성되어 있습니다. 공장 증설 자금을 조달해야 하나 대출이 곤란합니다. 조직 변경 방안이 있을까요?"], ["답변", "「상법」제242조(조직변경): (가)는 총사원의 동의로 일부사원을 유한책임사원으로 하거나 유한책임사원을 새로 가입시켜 (나)로 변경할 수 있습니다."]]}], "choices": ["(가)의 사원은 다른 사원의 동의를 얻지 아니하면 그 지분의 전부 또는 일부를 타인에게 양도하지 못한다.", "(나)의 각 사원은 출자 1좌마다 1개의 의결권을 가진다.", "(나)의 유한책임사원은 정관에 다른 규정이 없는 때에는 회사의 업무를 집행할 권리와 의무가 있다.", "(가)와 (나)는 자본을 증권화하여 유통할 수 있다.", "제시된 방안을 실행할 경우 ○○ 회사는 물적 회사에서 인적 회사로 변경된다."], "answer": "①", "items": [{"k": "①", "ox": "O", "t": "(가) 합명회사 사원의 지분 양도는 다른 사원 전원의 동의 필요."}, {"k": "②", "ox": "X", "t": "각 사원이 <b>출자 1좌마다 1개의 의결권</b>을 갖는 회사는 <b>유한회사</b>다(주식회사는 ‘1주 1의결권’). (나) 합자회사가 아니므로 옳지 않다."}, {"k": "③", "ox": "X", "t": "합자회사의 <b>업무 집행은 무한책임사원</b>이 담당한다(유한책임사원은 원칙적으로 업무 집행권이 없음) → 옳지 않다."}, {"k": "④", "ox": "X", "t": "합명·합자회사는 자본의 증권화(주식 발행)가 불가."}, {"k": "⑤", "ox": "X", "t": "(가) 합명회사는 <b>대표적 인적회사</b>, (나) 합자회사는 인적회사 속성 + 유한책임이 결합된 형태다. 합명→합자 변 (나) ㄹ"], "answer": "①", "items": [{"k": "ㄱ", "ox": "N", "t": "적성·흥미 검사·자료 수집 = (가) 정보 및 대안 탐색."}, {"k": "ㄴ", "ox": "N", "t": "전망·급여·복지 기준 비교 후 결정 = (나) 대안 평가 및 결정."}, {"k": "ㄷ", "ox": "N", "t": "진출 분야 고민 필요성 자각 = 문제 인식 단계."}, {"k": "ㄹ", "ox": "N", "t": "적합 직업 3가지로 압축 = 대안 선택 단계."}], "trap": "‘탐색’(가)와 ‘비교·결정’(나)을 혼동 금지. 3가지 압축=대안 선택 단계.", "concept": "합리적 의사결정: 문제인식→정보·대안탐색→대안선택→대안평가·결정."}, {"label": "15번", "score": "2점", "src": "6p · ○○(주) NCS 신입사원 채용 공고", "stem": "다음은 [○○(주) 신입사원 채용 공고]의 일부이다. 이에 대한 설명으로 적절한 것만을 〈보기〉에서 고른 것은?", "stim": [{"t": "case", "title": "○○(주) 신입사원 채용 공고", "lines": ["(1) 전형 방법: NCS 기반 블라인드 채용", "  - 1차 서류 전형: 입사 지원서·자기 소개서·직무 수행 계획서", "  - 2차 필기 및 면접 전형: 직무 능력 평가"]}, {"t": "table", "cap": "(2) 직무 기술서", "head": ["채용 분야", "대분류", "중분류", "소분류", "세분류"], "rows": [["(가)", "23.환경·에너지·안전", "06.산업안전", "01.산업안전관리", "00.산업안전관리공통직무"]]}, {"t": "table", "head": ["(나)", "분류 번호", "명칭", "수준"], "rows": [["", "2306010001_21v1", "산업안전관리 계획수립", "5"], ["", "2306010006_21v4", "산업재해 대응", "6"]]}], "bogi": ["ㄱ. (가)에 ‘산업 안전 및 위험 관리원’이 들어갈 수 있다.", "ㄴ. (나)는 NCS ‘능력단위요소’로서 ‘교수·학습 자료’를 나타낸 것이다.", "ㄷ. 서류 전형의 평가 시 성별, 학력, 출신 학교를 배제한다.", "ㄹ. ‘수준’에 나타난 숫자는 직무 수행의 순서를 나타낸 것이다."], "choices": ["ㄱ, ㄴ", "ㄱ, ㄷ", "ㄴ, ㄷ", "ㄴ, ㄹ", "ㄷ, ㄹ"], "answer": "② ㄱ, ㄷ", "items": [{"k": "ㄱ", "ox": "O", "t": "(가)는 <b>채용 분야(직무)</b>란이다. 세분류(직무)에 해당하는 직업명인 ‘산업 안전 및 위험 관리원’이 들어갈 수 있다 → 옳다."}, {"k": "ㄴ", "ox": "X", "t": "(나)는 분류번호·명칭·수준으로 제시된 <b>능력단위</b>다(능력단위 ‘요소’도, 교수·학습 자료도 아님). <b>능력단위 요소</b>는 능력단위를 구성하는 핵심 하위 능력을 말한다 → 옳지 않다."}, {"k": "ㄷ", "ox": "O", "t": "<b>NCS 기반 블라인드 채용</b>이므로 서류 평가 시 성별·학력·출신 학교 등을 배제한다 → 옳다."}, {"k": "ㄹ", "ox": "X", "t": "‘수준’은 지식·기술의 <b>숙련도·역량·경력</b> 등을 평가하여 <b>8수준</b>으로 나눈 <b>NCS 수준 체계</b>다(<b>숫자가 높을수록 높은 수준</b>). 수행 순서가 아니므로 옳지 않다. 참고로 <b>특성화고 졸업생은 2·3수준</b>에 해당한다."}], "trap": "(가)=채용 분야(직무), (나)=<b>능력단위</b>. <b>능력단위</b>(직무 구성 기본 단위) vs <b>능력단위 요소</b>(핵심 하위 능력) 구분! ‘수준’ 숫자는 <b>NCS 8단계 수준 체계</b>이지 수행 순서가 아니다.", "concept": "NCS = 산업현장 직무 능력의 국가 표준. <b>분류</b>: 대→중→소→세분류(직무). <b>구성</b>: 능력단위 → 능력단위 요소 → 수행 준거·지식·기술·태도(+적용 범위·평가 지침·직업 기초 능력). <b>수준</b>: 1~8단계. <b>블라인드 채용</b>: 성별·학력·출신학교 등 배제.<div style='font-size:12.5px;font-weight:800;color:#4b3fc4;margin:12px 0 5px'>🔢 NCS 분류 번호 체계 — (나)의 ‘2306010001_21v1’ 읽기</div><div style='display:flex;flex-wrap:wrap;gap:4px;margin-top:4px'><div style='flex:1;min-width:46px;text-align:center;background:#f4f3f8;border:1px solid #ddd6f5;border-radius:8px;padding:6px 3px'><div style='font-size:13px;font-weight:900;color:#4b3fc4'>23</div><div style='font-size:9.5px;color:#6b6486;margin-top:2px'>대분류</div></div><div style='flex:1;min-width:46px;text-align:center;background:#f4f3f8;border:1px solid #ddd6f5;border-radius:8px;padding:6px 3px'><div style='font-size:13px;font-weight:900;color:#4b3fc4'>06</div><div style='font-size:9.5px;color:#6b6486;margin-top:2px'>중분류</div></div><div style='flex:1;min-width:46px;text-align:center;background:#f4f3f8;border:1px solid #ddd6f5;border-radius:8px;padding:6px 3px'><div style='font-size:13px;font-weight:900;color:#4b3fc4'>01</div><div style='font-size:9.5px;color:#6b6486;margin-top:2px'>소분류</div></div><div style='flex:1;min-width:46px;text-align:center;background:#e7f6d8;border:1px solid #bfe09a;border-radius:8px;padding:6px 3px'><div style='font-size:13px;font-weight:900;color:#2f6a22'>00</div><div style='font-size:9.5px;color:#4f7a38;margin-top:2px'>세분류</div></div><div style='flex:1;min-width:46px;text-align:center;background:#e7f6d8;border:1px solid #bfe09a;border-radius:8px;padding:6px 3px'><div style='font-size:13px;font-weight:900;color:#2f6a22'>01</div><div style='font-size:9.5px;color:#4f7a38;margin-top:2px'>능력단위</div></div><div style='flex:1;min-width:46px;text-align:center;background:#f4f3f8;border:1px solid #ddd6f5;border-radius:8px;padding:6px 3px'><div style='font-size:13px;font-weight:900;color:#4b3fc4'>_</div><div style='font-size:9.5px;color:#6b6486;margin-top:2px'>언더바</div></div><div style='flex:1;min-width:46px;text-align:center;background:#e7f6d8;border:1px solid #bfe09a;border-radius:8px;padding:6px 3px'><div style='font-size:13px;font-weight:900;color:#2f6a22'>21</div><div style='font-size:9.5px;color:#4f7a38;margin-top:2px'>개발연도</div></div><div style='flex:1;min-width:46px;text-align:center;background:#e7f6d8;border:1px solid #bfe09a;border-radius:8px;padding:6px 3px'><div style='font-size:13px;font-weight:900;color:#2f6a22'>v1</div><div style='font-size:9.5px;color:#4f7a38;margin-top:2px'>버전</div></div></div><div style='font-size:11px;color:#6b6486;margin-top:6px;line-height:1.65'>대분류~능력단위는 각 <b>2자리 숫자</b>(대→중→소→세분류→능력단위 식별), 개발연도는 ‘<b>_</b>’ 뒤 2자리(2012→12·2021→21), 버전은 <b>v+숫자</b>. → 환경·에너지·안전(23)·산업안전(06)·산업안전관리(01)·세분류(00)·능력단위(01)를 <b>2021년 개발한 v1</b> 표준.</div>", "preIntroTitle": "🧩 NCS(국가직무능력표준)의 구성", "preIntro": "<div class='spm-intro'>🔧 <b>국가직무능력표준(NCS)</b>은 산업 현장의 직무 수행에 필요한 능력을 국가가 표준화한 것. 분류의 <b>세분류=직무</b>, 직무를 구성하는 기본 단위가 <b>능력단위</b>다. 능력단위는 분류번호·정의·<b>능력단위 요소</b>(수행 준거, 지식·기술·태도)·적용 범위 및 작업 상황·평가 지침·직업 기초 능력 등으로 구성된다.</div><div style='background:#f6faf0;border:1px solid #d8ebc4;border-radius:14px;padding:12px 14px;margin-bottom:14px'><div style='font-size:12.5px;font-weight:800;color:#3f7a2e;margin-bottom:9px'>🗂️ NCS의 분류 — 직무 유형(Type) 중심의 단계적 구성</div><div style='display:flex;flex-wrap:wrap;align-items:center;gap:7px'><span style='display:inline-block;background:#fff;border:1px solid #c8e3ad;border-radius:10px;padding:6px 12px;color:#3f7a2e;text-align:center;line-height:1.3;font-size:11px;font-weight:800'>대분류<br><b style='font-size:13.5px;color:#2f6a22'>24개</b></span><span style='color:#7bb05a;font-weight:900;font-size:13px'>→</span><span style='display:inline-block;background:#fff;border:1px solid #c8e3ad;border-radius:10px;padding:6px 12px;color:#3f7a2e;text-align:center;line-height:1.3;font-size:11px;font-weight:800'>중분류<br><b style='font-size:13.5px;color:#2f6a22'>81개</b></span><span style='color:#7bb05a;font-weight:900;font-size:13px'>→</span><span style='display:inline-block;background:#fff;border:1px solid #c8e3ad;border-radius:10px;padding:6px 12px;color:#3f7a2e;text-align:center;line-height:1.3;font-size:11px;font-weight:800'>소분류<br><b style='font-size:13.5px;color:#2f6a22'>273개</b></span><span style='color:#7bb05a;font-weight:900;font-size:13px'>→</span><span style='display:inline-block;background:#e7f6d8;border:1px solid #c8e3ad;border-radius:10px;padding:6px 12px;color:#3f7a2e;text-align:center;line-height:1.3;font-size:11px;font-weight:800'>세분류<br><b style='font-size:13.5px;color:#2f6a22'>1,100개</b><br><span style='font-size:9.5px;color:#5a7a45'>= 직무</span></span></div><div style='font-size:11px;color:#5a6b4a;margin-top:9px;line-height:1.6'>한국고용직업분류(KECO) 등을 참고해 분류한 것으로, NCS 개발의 전체 <b>로드맵</b>을 제시한다. <b>(2025년 11월 기준)</b></div></div><div style='overflow-x:auto'><svg viewBox='0 0 860 286' class='svgfig' xmlns='http://www.w3.org/2000/svg'><rect x='8' y='8' width='520' height='24' rx='6' fill='#e7e5ee'/><text x='268' y='24' text-anchor='middle' font-size='11.5' font-weight='800' fill='#6b6480'>능력단위</text><rect x='632' y='8' width='220' height='24' rx='6' fill='#e7e5ee'/><text x='742' y='24' text-anchor='middle' font-size='11.5' font-weight='800' fill='#6b6480'>능력단위의 집합</text><line x1='72' y1='80' x2='92' y2='80' stroke='#c4b5fd' stroke-width='1.8'/><line x1='174' y1='80' x2='206' y2='80' stroke='#c4b5fd' stroke-width='1.8'/><polyline points='174,80 190,80 190,164 206,164' fill='none' stroke='#c4b5fd' stroke-width='1.8'/><polyline points='174,80 190,80 190,200 206,200' fill='none' stroke='#c4b5fd' stroke-width='1.8'/><polyline points='174,80 190,80 190,236 206,236' fill='none' stroke='#c4b5fd' stroke-width='1.8'/><polyline points='326,80 357,80 357,60 388,60' fill='none' stroke='#c4b5fd' stroke-width='1.8'/><polyline points='326,80 357,80 357,98 388,98' fill='none' stroke='#c4b5fd' stroke-width='1.8'/><line x1='742' y1='82' x2='742' y2='96' stroke='#c4b5fd' stroke-width='1.8'/><rect x='12' y='64' width='60' height='32' rx='8' fill='#6b6480' stroke='# ke='#ddd6f5'/><text x='742.0' y='145.0' text-anchor='middle' font-size='11' font-weight='800' fill='#4b3fc4'>능력단위 2</text><text x='742' y='174' text-anchor='middle' font-size='14' font-weight='800' fill='#8b86a8'>⋮</text><rect x='692' y='182' width='100' height='26' rx='8' fill='#fff' stroke='#ddd6f5'/><text x='742.0' y='199.0' text-anchor='middle' font-size='11' font-weight='800' fill='#4b3fc4'>능력단위 n</text></svg></div><div style='font-size:13.5px;font-weight:800;color:#4b3fc4;margin:14px 0 6px'>📋 NCS 구성 항목 한눈에</div><div class='mom-grid'><div class='mom-card' style='--mc:#6c5ce7'><div class='mom-card-head'><span class='mom-ico'>🧱</span><span class='mom-tit'>능력단위</span></div><div class='mom-body'><div class='mom-row'><span class='mom-rv'>NCS의 <b>직무를 구성하는 기본 단위</b>. 목적·업무 수행 및 활용 범위를 개략적으로 기술</span></div></div><div class='mom-desc'>📍 NCS 직무의 기본 단위</div></div><div class='mom-card' style='--mc:#4f8def'><div class='mom-card-head'><span class='mom-ico'>🧩</span><span class='mom-tit'>능력단위 요소</span></div><div class='mom-body'><div class='mom-row'><span class='mom-rv'>능력단위를 구성하는 <b>핵심 하위 능력</b></span></div></div><div class='mom-desc'>📍 능력단위를 구성</div></div><div class='mom-card' style='--mc:#e8729b'><div class='mom-card-head'><span class='mom-ico'>🎯</span><span class='mom-tit'>수행 준거</span></div><div class='mom-body'><div class='mom-row'><span class='mom-rv'>능력단위 요소별로 <b>도달해야 하는 수행 기준</b> 제시</span></div></div><div class='mom-desc'>📍 능력단위 요소의 하위</div></div><div class='mom-card' style='--mc:#2bb586'><div class='mom-card-head'><span class='mom-ico'>🧠</span><span class='mom-tit'>지식·기술·태도</span></div><div class='mom-body'><div class='mom-row'><span class='mom-rv'>능력단위 요소를 수행하는 데 필요한 <b>지식·기술·태도</b></span></div></div><div class='mom-desc'>📍 능력단위 요소의 하위</div></div><div class='mom-card' style='--mc:#e8954f'><div class='mom-card-head'><span class='mom-ico'>🗺️</span><span class='mom-tit'>적용 범위 및 작업 상황</span></div><div class='mom-body'><div class='mom-row'><span class='mom-rv'>수행 관련 <b>범위·물리적·환경적 조건</b>, 관련 자료·서류·장비·도구·재료</span></div></div><div class='mom-desc'>📍 능력단위 구성 항목</div></div><div class='mom-card' style='--mc:#7a6fb0'><div class='mom-card-head'><span class='mom-ico'>📝</span><span class='mom-tit'>평가 지침</span></div><div class='mom-body'><div class='mom-row'><span class='mom-rv'>능력단위의 성취 여부 <b>평가 방법</b>과 평가 시 고려할 사항</span></div></div><div class='mom-desc'>📍 능력단위 구성 항목</div></div><div class='mom-card' style='--mc:#1aa39a'><div class='mom-card-head'><span class='mom-ico'>💪</span><span class='mom-tit'>직업 기초 능력</span></div><div class='mom-body'><div class='mom-row'><span class='mom-rv'>업무 수행을 위해 <b>공통으로 갖추어야 할 기본 직업 능력</b></span></div></div><div class='mom-desc'>📍 능력단위 구성 항목</div></div><div style=\"grid-column:span 2;background:linear-gradient(135deg,#fff4f8,#fffdfe);border:1px solid #f3cdd9;border-radius:16px;padding:14px 16px;box-shadow:0 10px 24px -16px rgba(192,70,138,.32)\"><div style='font-size:13px;font-weight:900;color:#c0468a;margin-bottom:8px'>📌 함정 포인트</div><div style='font-size:12px;line-height:1.8;color:#5a5570'><b>❶ 능력단위 ↔ 능력단위 요소</b> — 직무를 구성하는 ‘기본 단위’와 그 ‘핵심 하위 능력’을 구분!<br><b>❷ ‘수준’ = NCS 8수준 체계</b> — 지식·기술의 <b>숙련도·역량·경력</b> 등을 평가해 <b>8수준</b>으로 구분. <b>숫자가 높을수록 높은 수준</b>이며, <b>특성화고 졸업생은 2·3수준</b>! (수행 순서 ✗)<br><b>❸ 수행 준거</b> = 능력단위 요소별 <b>도달 기준</b> → <b>15번 ㄹ</b> 직결</div></div></div>"}]}]
;
const CIRC=["①","②","③","④","⑤"];
let active="home";const revealed={};let showAll=false;
const oxClass=ox=>ox==="O"?"ox-O":ox==="X"?"ox-X":"ox-N";
function goHome(){active="home";showAll=false;render();goTop();}
function openSec(id){active=id;render();goTop();}
function goTop(){try{window.scrollTo({top:0,behavior:"smooth"});}catch(e){window.scrollTo(0,0);}}
function fndTab(t){
  document.querySelectorAll(".fnd-tab").forEach(b=>b.classList.toggle("on",b.dataset.t===t));
  document.querySelectorAll(".fnd-panel").forEach(p=>p.style.display=(p.dataset.p===t?"block":"none"));
}
function key(sid,i){return sid+"-"+i;}
function toggle(sid,i){const k=key(sid,i);revealed[k]=!revealed[k];render();}
function counts(sec){let t=0,o=0;sec.items.forEach((_,i)=>{t++;if(showAll||revealed[key(sec.id,i)])o++;});return{t,o};}
function ansNum(a){const m=a.match(/[①②③④⑤]/);return m?CIRC.indexOf(m[0]):-1;}

function renderStim(blocks){
  if(!blocks)return"";
  return blocks.map(b=>{
    if(b.t==="case"){
      let title=b.title?`<span class="casetitle">${b.title}</span>`:"";
      let lines=(b.lines||[]).map(l=>`<p class="caseline">${l}</p>`).join("");
      return `<div class="exambox"><div class="exambody">${title}${lines}</div></div>`;
    }
    if(b.t==="person"){
      let rows=b.rows.map(r=>`<div class="person"><span class="pkey">${r[0]}</span><span class="ptext">${r[1]}</span></div>`).join("");
      return `<div class="exambox"><div class="exambody">${rows}</div></div>`;
    }
    if(b.t==="dialogue"){
      let rows=b.rows.map(r=>`<div class="dia"><span class="dwho">${r[0]}</span><span class="dtext">${r[1]}</span></div>`).join("");
      return `<div class="exambox"><div class="exambody">${rows}</div></div>`;
    }
    if(b.t==="table"){
      let cap=b.cap?`<div class="examcap">${b.cap}</div>`:"";
      let head=b.head?`<tr>${b.head.map(h=>`<th>${h}</th>`).join("")}</tr>`:"";
      let rows=b.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("");
      return `<div class="exambox">${cap}<div class="exambody" style="padding:0"><table class="examtable">${head}${rows}</table></div></div>`;
    }
    if(b.t==="matrix"){
      return `<div class="exambox"><div class="examcap">고객과의 상호 작용 및 고객 맞춤화 정도</div><div class="exambody matrix">
        <table>
          <tr><td rowspan="2" class="axis">노동<br>집약도</td><td class="mh"></td><td class="mh">낮음</td><td class="mh">높음</td></tr>
          <tr style="display:none"></tr>
          <tr><td class="mh">낮음</td><td class="mcell">서비스 공장<br>(예: 항공사·통신사)</td><td class="mcell">서비스 점포<br>(예: 대형 병원·정비소)</td></tr>
          <tr><td class="mh">높음</td><td class="mga">(가)</td><td class="mga">(나)</td></tr>
        </table></div></div>`;
    }
    if(b.t==="note") return `<p class="note">${b.text}</p>`;
    if(b.t==="svg") return `<div class="exambox"><div class="exambody">${b.svg}</div></div>`;
    return "";
  }).join("");
}

function renderChoices(it){
  if(!it.choices)return"";
  const open=showAll||true; // 선택지는 항상 표시
  const right=ansNum(it.answer);
  let lis=it.choices.map((c,idx)=>{
    let cls = (it._showA && right===idx)?"right":(it._showA?"wrong":"");
    return `<div class="choice ${cls}"><span class="cnum">${CIRC[idx]}</span><span>${c}</span></div>`;
  }).join("");
  return `<div class="choices">${lis}</div>`;
}

function render(){
  const v=document.getElementById("view");
  if(active==="home"){
    let tiles=DATA.map(d=>`<button class="tile" onclick="openSec('${d.id}')">
      <div class="tileicon">${d.icon}</div><div class="tileno">${d.no}</div>
      <div class="tiletitle">${d.title}</div><div class="tilesub">${d.sub}</div>
      <div class="tilecnt">${d.items.length}문항</div></button>`).join("");
    v.innerHTML=`
      <header class="hero">
        <div class="heropill">2027학년도 6월 모평 대비 🔍</div>
        <h1 class="herotitle"><span>은또링쌤의 <span class="heroacc">행성 연구소</span></span>
          <img class="herobear" src="${BEAR}" alt="곰돌이"/></h1>
        <p class="herosub">성공적인 직업생활 · 기출 문제 풀이 ✨</p>
        <div class="herostats">
          <div class="stat"><div class="statnum">25<span class="statunit">문항</span></div><div class="statlbl">기출 편집</div></div>
          <div class="stat"><div class="statnum">6<span class="statunit">개</span></div><div class="statlbl">출제 영역</div></div>
          <div class="stat"><div class="statnum">D-1<span class="statunit"></span></div><div class="statlbl">시험 대비</div></div>
        </div>
      </header>
      <div class="sechead"><h2 class="sech2">출제 <span class="acc">영역</span></h2></div>
      <div class="grid">${tiles}</div>
      <div class="topbtnwrap"><button class="topbtn" onclick="goTop()">↑ 맨 위로 가기</button></div>`;
    return;
  }
  const sec=DATA.find(d=>d.id===active);
  const c=counts(sec);
  let chips=DATA.map(d=>`<button class="chip ${d.id===active?'active':''}" onclick="openSec('${d.id}')">${d.no} ${d.title}</button>`).join("");
  let cards=sec.items.map((it,i)=>{
    const open=showAll||revealed[key(sec.id,i)];
    it._showA=open;
    let opts=it.items.map(o=>`<div class="opt"><span class="optk ${oxClass(o.ox)}">${o.k}</span><span class="optt">${o.t}</span></div>`).join("");
    let bogi=it.bogi?`<div class="bogibox"><div class="bogicap">보 기</div>${it.bogi.map(b=>`<div class="bogiitem">${b}</div>`).join("")}</div>`:"";
    let body=open?`<div class="answerwrap">
        <div class="ansrow"><span class="ansdot">✓</span><span class="anslbl">정답 &amp; 보기 해설</span></div>
        <div class="answer">정답 · ${it.answer}</div>${opts}
        <div class="trap"><span class="traplbl">⚠ 함정 포인트</span><div class="tt">${it.trap}</div></div>
        <div class="concept"><span class="cplbl">📌 핵심 개념</span><div class="ct">${it.concept}</div></div>
      </div>`:"";
    let pre=it.preIntro?`<div class="introcard"><div class="introhead">${it.preIntroTitle||'한눈에 개념 정리'}</div>${it.preIntro}</div>`:"";
    return `${pre}<article class="card">
      <div class="cardhead"><span class="badge">문제</span><span class="scoreb">${it.score}</span><h2 class="cardtitle">${it.label}</h2></div>
      <div class="src">${it.src}</div>
      <p class="stem">${it.stem}</p>
      ${renderStim(it.stim)}
      ${bogi}
      ${renderChoices(it)}
      ${body}
      <button class="revealbtn ${open?'open':''}" onclick="toggle('${sec.id}',${i})">${open?'정답·해설 닫기 ▲':'정답·해설 보기 ▼'}</button>
    </article>`;
  }).join("");
  v.innerHTML=`
    <header class="sechero">
      <button class="backbtn" onclick="goHome()">← 처음으로</button>
      <div class="secicon">${sec.icon}</div>
      <div class="seckicker">${sec.no} · ${sec.items.length}문항</div>
      <h1 class="sectitle">${sec.title}</h1>
      <p class="secsub">${sec.sub}</p>
    </header>
    <div class="chiprow">${chips}</div>
    <div class="toolbar"><span class="progress">확인 ${c.o}/${c.t}</span>
      <button class="ghostbtn" onclick="showAll=!showAll;render();">${showAll?'정답 모두 숨기기':'정답 모두 보기'}</button></div>
    ${sec.intro?`<div class="introcard"><div class="introhead">${sec.introTitle||'한눈에 개념 정리'}</div>${sec.intro}</div>`:''}
    ${sec.intro2?`<div class="introcard"><div class="introhead">${sec.intro2Title||'한눈에 개념 정리'}</div>${sec.intro2}</div>`:''}
    <div class="main">${cards}</div>
    <div class="topbtnwrap"><button class="topbtn" onclick="goTop()">↑ 맨 위로 가기</button></div>`;
}
render();
</script>
</body></html>
